<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Empréstimos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:15px;color:#1a1a1a;background:#f5f5f3}
.app{max-width:700px;margin:0 auto;padding:1.25rem}
h1{font-size:20px;font-weight:600;margin-bottom:1.25rem}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.metric{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:.875rem 1rem}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-green{background:#e1f5ee;color:#085041}
.b-amber{background:#faeeda;color:#633806}
.b-red{background:#fcebeb;color:#791f1f}
.b-gray{background:#f1f0ec;color:#5f5e5a}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:6px 8px;color:#888;font-weight:500;border-bottom:1px solid #eee}
td{padding:9px 8px;border-bottom:1px solid #eee;vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;color:#1a1a1a}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-ghost{border:none;background:transparent;cursor:pointer;color:#888;padding:4px 6px;border-radius:8px;font-size:13px}
.btn-ghost:hover{background:#f5f5f3;color:#1a1a1a}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:#888}
input,select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:14px}
input:focus,select:focus{outline:none;border-color:#888}
.avatar{width:36px;height:36px;border-radius:50%;background:#eeedfe;color:#3c3489;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.avatar-lg{width:48px;height:48px;font-size:15px}
.person-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:.875rem 1.25rem;margin-bottom:.75rem;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.person-card:hover{border-color:#aaa}
.person-info{flex:1;min-width:0}
.person-name{font-weight:600;font-size:14px}
.person-sub{font-size:12px;color:#888;margin-top:2px}
.person-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.upcoming-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;margin-bottom:8px;cursor:pointer}
.upcoming-item.urgent{background:#fcebeb}
.upcoming-item.soon{background:#faeeda}
.upcoming-item.ok{background:#e1f5ee}
.upcoming-days{font-size:22px;font-weight:700;min-width:36px;text-align:center}
.upcoming-days.urgent{color:#791f1f}
.upcoming-days.soon{color:#633806}
.upcoming-days.ok{color:#085041}
.tab-filter{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.tab-filter button{padding:6px 14px;border-radius:20px;border:1px solid #e5e5e5;background:#fff;cursor:pointer;font-size:13px;color:#888}
.tab-filter button.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#888;cursor:pointer;font-size:13px;margin-bottom:1rem;background:none;border:none}
.back-btn:hover{color:#1a1a1a}
.progress-bar{height:5px;background:#eee;border-radius:10px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:10px;background:#1d9e75}
.section-title{font-size:12px;font-weight:600;color:#888;margin:1.25rem 0 .5rem;text-transform:uppercase;letter-spacing:.05em}
.empty{color:#888;font-size:13px;padding:.75rem 0}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-wrap.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:92%;max-width:460px;border:1px solid #e5e5e5}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem}
.search-bar{display:flex;gap:8px;margin-bottom:1rem}
.search-bar input{flex:1}
.view{display:none}.view.active{display:block}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

<div class="view active" id="view-home">
  <h1>💰 Gestão de Empréstimos</h1>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Pessoas ativas</div><div class="metric-value" id="m-pessoas" style="color:#534ab7">0</div></div>
    <div class="metric"><div class="metric-label">Total emprestado</div><div class="metric-value" id="m-total">R$0</div></div>
    <div class="metric"><div class="metric-label">A receber</div><div class="metric-value" id="m-receber" style="color:#0f6e56">R$0</div></div>
    <div class="metric"><div class="metric-label">Em atraso</div><div class="metric-value" id="m-atraso" style="color:#a32d2d">R$0</div></div>
  </div>

  <div class="section-title">⏰ Próximos vencimentos</div>
  <div id="upcoming-list"></div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;margin-top:1.25rem">
    <div class="section-title" style="margin:0">👥 Mutuários</div>
    <div style="display:flex;gap:8px">
      <input type="text" id="search-home" placeholder="Buscar..." style="width:150px;padding:5px 10px;font-size:13px" oninput="renderHome()">
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ Novo</button>
    </div>
  </div>
  <div id="pessoas-list"></div>
</div>

<div class="view" id="view-pessoa">
  <button class="back-btn" onclick="goHome()">← Todos os mutuários</button>
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:1.25rem">
    <div class="avatar avatar-lg" id="p-avatar"></div>
    <div style="flex:1">
      <div style="font-size:18px;font-weight:600" id="p-nome"></div>
      <div style="font-size:13px;color:#888;margin-top:2px" id="p-sub"></div>
    </div>
    <span class="badge" id="p-status-badge"></span>
    <button class="btn btn-sm" onclick="excluirPessoa()" style="color:#a32d2d;border-color:#f7c1c1">🗑</button>
  </div>
  <div class="metrics" id="p-metrics"></div>
  <div class="section-title">Histórico de parcelas</div>
  <div class="tab-filter">
    <button class="active" onclick="setFilter('todas',this)">Todas</button>
    <button onclick="setFilter('atrasadas',this)">Em atraso</button>
    <button onclick="setFilter('pendentes',this)">Pendentes</button>
    <button onclick="setFilter('pagas',this)">Pagas</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead><tr><th style="width:55px">Parcela</th><th style="width:95px">Vencimento</th><th style="width:105px">Valor</th><th style="width:90px">Status</th><th style="width:45px"></th></tr></thead>
      <tbody id="parcelas-tbody"></tbody>
    </table>
  </div>
</div>

<div class="modal-wrap" id="modal">
  <div class="modal">
    <div class="modal-title">Novo empréstimo</div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Nome do mutuário</label><input type="text" id="f-nome" placeholder="Ex: João Silva"></div>
      <div class="form-group"><label>Valor total (R$)</label><input type="number" id="f-valor" min="0" step="0.01" placeholder="0,00"></div>
      <div class="form-group"><label>Nº de parcelas</label><input type="number" id="f-np" min="1" max="360" placeholder="Ex: 12"></div>
      <div class="form-group"><label>Juros ao mês (%)</label><input type="number" id="f-juros" min="0" step="0.1" value="0"></div>
      <div class="form-group"><label>1º vencimento</label><input type="date" id="f-data"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()">Salvar empréstimo</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>

<script>
const STORAGE_KEY = 'emprestimos_v1';
let data = [];
let currentPessoa = null;
let parcelaFilter = 'todas';

function load() {
  try { data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { data = []; }
}
function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function today() { return new Date().toISOString().split('T')[0]; }
function fmtVal(v) { return 'R$\u00a0' + Number(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtDate(s) { if(!s) return '—'; const [y,m,d]=s.split('-'); return d+'/'+m+'/'+y; }
function initials(n) { return n.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
function diffDays(dateStr) {
  const t = new Date(today()+'T12:00:00');
  const d = new Date(dateStr+'T12:00:00');
  return Math.round((d-t)/86400000);
}
function getStatus(emp) {
  const t = today();
  const pend = emp.parcelas.filter(p=>!p.pago);
  if(!pend.length) return 'quitado';
  if(pend.some(p=>p.vencimento<t)) return 'atraso';
  return 'ativo';
}

function openModal() {
  const next = new Date(); next.setMonth(next.getMonth()+1);
  document.getElementById('f-data').value = next.toISOString().split('T')[0];
  document.getElementById('f-nome').value='';
  document.getElementById('f-valor').value='';
  document.getElementById('f-np').value='';
  document.getElementById('f-juros').value='0';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function salvar() {
  const nome = document.getElementById('f-nome').value.trim();
  const valor = parseFloat(document.getElementById('f-valor').value);
  const np = parseInt(document.getElementById('f-np').value);
  const juros = parseFloat(document.getElementById('f-juros').value)||0;
  const dataStr = document.getElementById('f-data').value;
  if(!nome||!valor||!np||!dataStr) { alert('Preencha todos os campos.'); return; }
  const taxa = juros/100;
  let vp = taxa>0 ? valor*(taxa*Math.pow(1+taxa,np))/(Math.pow(1+taxa,np)-1) : valor/np;
  const parcelas = [];
  for(let i=0;i<np;i++) {
    let d = new Date(dataStr+'T12:00:00');
    d.setMonth(d.getMonth()+i);
    parcelas.push({num:i+1, vencimento:d.toISOString().split('T')[0], valor:vp, pago:false});
  }
  data.push({id:Date.now(), nome, valorOriginal:valor, parcelas, criadoEm:today()});
  persist(); closeModal(); renderHome();
  toast('Empréstimo de '+nome+' salvo!');
}

function goHome() {
  currentPessoa=null; parcelaFilter='todas';
  document.getElementById('view-home').classList.add('active');
  document.getElementById('view-pessoa').classList.remove('active');
  renderHome();
}

function openPessoa(id) {
  currentPessoa=id;
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-pessoa').classList.add('active');
  parcelaFilter='todas';
  document.querySelectorAll('.tab-filter button').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderPessoa();
}

function setFilter(f, btn) {
  parcelaFilter=f;
  document.querySelectorAll('.tab-filter button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPessoa();
}

function togglePago(empId, pNum) {
  const emp = data.find(e=>e.id===empId);
  if(!emp) return;
  const p = emp.parcelas.find(p=>p.num===pNum);
  if(p){ p.pago=!p.pago; persist(); renderPessoa(); renderHome(); toast(p.pago?'Parcela marcada como paga!':'Parcela desmarcada.'); }
}

function excluirPessoa() {
  const emp = data.find(e=>e.id===currentPessoa);
  if(!emp||!confirm('Excluir empréstimo de '+emp.nome+'?')) return;
  data=data.filter(e=>e.id!==currentPessoa);
  persist(); goHome(); toast('Empréstimo excluído.');
}

function renderHome() {
  const t = today();
  let totalVal=0, receberVal=0, atrasoVal=0;
  const ativos = data.filter(e=>getStatus(e)!=='quitado');
  data.forEach(emp=>{
    totalVal+=emp.valorOriginal;
    emp.parcelas.forEach(p=>{ if(!p.pago){ receberVal+=p.valor; if(p.vencimento<t) atrasoVal+=p.valor; } });
  });
  document.getElementById('m-pessoas').textContent=ativos.length;
  document.getElementById('m-total').textContent=fmtVal(totalVal);
  document.getElementById('m-receber').textContent=fmtVal(receberVal);
  document.getElementById('m-atraso').textContent=fmtVal(atrasoVal);

  let upcoming = [];
  data.forEach(emp=>{
    const pend = emp.parcelas.filter(p=>!p.pago).sort((a,b)=>a.vencimento>b.vencimento?1:-1);
    if(pend.length) upcoming.push({emp, p:pend[0], dias:diffDays(pend[0].vencimento)});
  });
  upcoming.sort((a,b)=>a.dias-b.dias);
  const upEl = document.getElementById('upcoming-list');
  upEl.innerHTML = upcoming.length ? upcoming.slice(0,8).map(({emp,p,dias})=>{
    const cls = dias<0?'urgent':dias<=7?'soon':'ok';
    const dLabel = dias<0?Math.abs(dias)+'d atraso':dias===0?'hoje':dias===1?'amanhã':dias+'d';
    return `<div class="upcoming-item ${cls}" onclick="openPessoa(${emp.id})">
      <div class="upcoming-days ${cls}">${Math.abs(dias)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px">${emp.nome}</div>
        <div style="font-size:12px;color:#888">Parcela ${p.num}/${emp.parcelas.length} · ${fmtDate(p.vencimento)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:600;font-size:14px">${fmtVal(p.valor)}</div>
        <div style="font-size:11px;color:#888">${dLabel}</div>
      </div>
    </div>`;
  }).join('') : '<div class="empty">Nenhum vencimento pendente.</div>';

  const q=(document.getElementById('search-home')?.value||'').toLowerCase();
  const lista=data.filter(e=>e.nome.toLowerCase().includes(q)).sort((a,b)=>{
    const ord={atraso:0,ativo:1,quitado:2};
    return ord[getStatus(a)]-ord[getStatus(b)];
  });
  const el=document.getElementById('pessoas-list');
  el.innerHTML = lista.length ? lista.map(emp=>{
    const st=getStatus(emp);
    const pago=emp.parcelas.filter(p=>p.pago).reduce((s,p)=>s+p.valor,0);
    const total=emp.parcelas.reduce((s,p)=>s+p.valor,0);
    const pct=total>0?Math.round(pago/total*100):0;
    const atrasadas=emp.parcelas.filter(p=>!p.pago&&p.vencimento<t).length;
    const bCls=st==='quitado'?'b-green':st==='atraso'?'b-red':'b-gray';
    const bLbl=st==='quitado'?'Quitado':st==='atraso'?'Em atraso':'Ativo';
    const prox=emp.parcelas.filter(p=>!p.pago).sort((a,b)=>a.vencimento>b.vencimento?1:-1)[0];
    return `<div class="person-card" onclick="openPessoa(${emp.id})">
      <div class="avatar">${initials(emp.nome)}</div>
      <div class="person-info">
        <div class="person-name">${emp.nome}</div>
        <div class="person-sub">${emp.parcelas.filter(p=>p.pago).length}/${emp.parcelas.length} parcelas pagas${atrasadas>0?' · <span style="color:#a32d2d">'+atrasadas+' atrasada'+(atrasadas>1?'s':'')+'</span>':''}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="person-right">
        <span class="badge ${bCls}">${bLbl}</span>
        <span style="font-size:12px;color:#888">${prox?'Próx: '+fmtDate(prox.vencimento):'Quitado'}</span>
      </div>
    </div>`;
  }).join('') : '<div class="empty">Nenhum mutuário cadastrado ainda.</div>';
}

function renderPessoa() {
  const emp=data.find(e=>e.id===currentPessoa);
  if(!emp) return;
  const t=today();
  const st=getStatus(emp);
  document.getElementById('p-avatar').textContent=initials(emp.nome);
  document.getElementById('p-nome').textContent=emp.nome;
  const pago=emp.parcelas.filter(p=>p.pago).reduce((s,p)=>s+p.valor,0);
  const total=emp.parcelas.reduce((s,p)=>s+p.valor,0);
  const pct=total>0?Math.round(pago/total*100):0;
  document.getElementById('p-sub').textContent=`${emp.parcelas.filter(p=>p.pago).length}/${emp.parcelas.length} parcelas · ${pct}% pago`;
  const badge=document.getElementById('p-status-badge');
  badge.className='badge '+(st==='quitado'?'b-green':st==='atraso'?'b-red':'b-gray');
  badge.textContent=st==='quitado'?'Quitado':st==='atraso'?'Em atraso':'Ativo';
  const atrasadas=emp.parcelas.filter(p=>!p.pago&&p.vencimento<t);
  document.getElementById('p-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total do contrato</div><div class="metric-value" style="font-size:16px">${fmtVal(total)}</div></div>
    <div class="metric"><div class="metric-label">Já pago</div><div class="metric-value" style="font-size:16px;color:#0f6e56">${fmtVal(pago)}</div></div>
    <div class="metric"><div class="metric-label">Restante</div><div class="metric-value" style="font-size:16px;color:#534ab7">${fmtVal(total-pago)}</div></div>
    <div class="metric"><div class="metric-label">Em atraso</div><div class="metric-value" style="font-size:16px;color:#a32d2d">${atrasadas.length}</div></div>`;
  let parcelas=[...emp.parcelas];
  if(parcelaFilter==='atrasadas') parcelas=parcelas.filter(p=>!p.pago&&p.vencimento<t);
  else if(parcelaFilter==='pendentes') parcelas=parcelas.filter(p=>!p.pago&&p.vencimento>=t);
  else if(parcelaFilter==='pagas') parcelas=parcelas.filter(p=>p.pago);
  const tbody=document.getElementById('parcelas-tbody');
  tbody.innerHTML=parcelas.length ? parcelas.map(p=>{
    let bCls='b-gray',bLbl='Pendente',rowBg='';
    if(p.pago){bCls='b-green';bLbl='Pago';}
    else if(p.vencimento<t){bCls='b-red';bLbl='Atrasado';rowBg='background:#fff8f8';}
    const dias=diffDays(p.vencimento);
    const dInfo=p.pago?'':dias<0?`<div style="font-size:11px;color:#a32d2d">${Math.abs(dias)}d atraso</div>`:dias<=7?`<div style="font-size:11px;color:#854f0b">em ${dias}d</div>`:'';
    return `<tr style="${rowBg}">
      <td style="color:#888">${p.num}ª</td>
      <td>${fmtDate(p.vencimento)}${dInfo}</td>
      <td style="font-weight:600">${fmtVal(p.valor)}</td>
      <td><span class="badge ${bCls}">${bLbl}</span></td>
      <td><button class="btn-ghost" onclick="togglePago(${emp.id},${p.num})" title="${p.pago?'Desmarcar':'Marcar como pago'}">${p.pago?'↩':'✓'}</button></td>
    </tr>`;
  }).join('') : '<tr><td colspan="5" style="padding:1.5rem;color:#888">Nenhuma parcela neste filtro.</td></tr>';
}

load();
renderHome();
</script>
</body>
</html>
